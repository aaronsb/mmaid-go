# ADR Configuration
# Defines domain numbering and validation rules.
# Used by: docs/scripts/adr

project_name: mmaid-go

# Domain Number Series
domains:
  core:
    range: [100, 199]
    name: Core
    description: Rendering engine, parser, diagram types
    folder: core

  cli:
    range: [200, 299]
    name: CLI
    description: CLI interface, flags, I/O, themes
    folder: cli

  ingest:
    range: [300, 399]
    name: Ingest
    description: Input formats, JSON templates, data pipelines
    folder: ingest

# Valid ADR statuses
statuses:
  - Draft
  - Proposed
  - Accepted
  - Superseded
  - Deprecated

# Default values for new ADRs
defaults:
  deciders: [aaronsb]
  status: Draft

# Legacy ADR range (pre-domain numbering)
legacy:
  range: [1, 99]
  label: "Legacy"

# Viewer command for `adr view`
viewer: cat {file}
